name: Newsletter Update 5 Final Patches

on:
  push:
    branches:
      - newsletter-editor-update-5-20260720

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: newsletter-editor-update-5-20260720
          fetch-depth: 0
      - name: Apply targeted workspace fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/admin/newsletter/EditorialWorkspace.tsx')
          text = path.read_text()
          replacements = {
              "function claimKey(claim: FactAuditClaim, index: number): string {\n  return `${claim.section}:${index}:${claim.claim}`.slice(0, 500);\n}":
              "function claimKey(claim: FactAuditClaim, _index: number): string {\n  return `${claim.section}:${claim.type}:${claim.claim}`.slice(0, 500);\n}",
              "if (queueRef.current.size > 0 && saveStatus !== 'conflict') {":
              "if (queueRef.current.size > 0) {",
              "}, [onHtmlUpdate, persistBrowserDraft, resolvedId, saveStatus]);":
              "}, [onHtmlUpdate, persistBrowserDraft, resolvedId]);",
              "const raw = anchor.dataset.section\n        ?? anchor.id.replace(/^section-/, '')\n        ?? [...anchor.classList].find(name => name.startsWith('section-'))?.replace(/^section-/, '');":
              "const raw = anchor.dataset.section\n        || anchor.id.replace(/^section-/, '')\n        || [...anchor.classList].find(name => name.startsWith('section-'))?.replace(/^section-/, '');",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected workspace text: {old[:80]}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/newsletter-update5-final-patches.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/admin/newsletter/EditorialWorkspace.tsx .github/workflows/newsletter-update5-final-patches.yml
          git commit -m "Newsletter System Update 5: finalize workspace behavior"
          git push origin HEAD:newsletter-editor-update-5-20260720
