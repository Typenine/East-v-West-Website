name: Newsletter Update 5 Autosave Guard

on:
  push:
    branches:
      - newsletter-editor-update-5-20260720

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: newsletter-editor-update-5-20260720
          fetch-depth: 0
      - name: Guard conflict retries
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/admin/newsletter/EditorialWorkspace.tsx')
          text = path.read_text()
          replacements = {
              "    try {\n      const response = await fetch('/api/newsletter/editor', {":
              "    let completed = false;\n    try {\n      const response = await fetch('/api/newsletter/editor', {",
              "      setSaveStatus(queueRef.current.size > 0 ? 'dirty' : 'saved');\n      return true;":
              "      setSaveStatus(queueRef.current.size > 0 ? 'dirty' : 'saved');\n      completed = true;\n      return true;",
              "      if (queueRef.current.size > 0) {\n        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);\n        saveTimerRef.current = setTimeout(() => { void flushSave(); }, 250);\n      }":
              "      if (completed && queueRef.current.size > 0) {\n        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);\n        saveTimerRef.current = setTimeout(() => { void flushSave(); }, 250);\n      }",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected workspace text: {old[:100]}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/newsletter-update5-autosave-guard.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/admin/newsletter/EditorialWorkspace.tsx .github/workflows/newsletter-update5-autosave-guard.yml
          git commit -m "Newsletter System Update 5: guard autosave conflicts"
          git push origin HEAD:newsletter-editor-update-5-20260720
