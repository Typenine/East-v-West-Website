name: Newsletter Generation (DEPRECATED)

# DEPRECATED — DO NOT RE-ENABLE THE SCHEDULE.
# This workflow called POST /api/newsletter/cron, which has been disabled (HTTP 410)
# and which used to AUTOPUBLISH newsletters. Scheduled generation now lives in
# .github/workflows/newsletter-scheduler.yml (scripts/run-newsletter.mjs), which
# saves DRAFTS only — it never autopublishes and never posts to Discord. Publishing
# is an explicit admin action via the admin newsletter page / POST /api/newsletter/publish.
#
# The schedule triggers were removed so this never runs automatically. The manual
# workflow_dispatch is retained only for historical/debugging use; the endpoint it
# calls returns 410 and performs no writes.

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Week number (leave empty for current)'
        required: false
        type: number
      season:
        description: 'Season year (leave empty for current)'
        required: false
        type: string
      publish:
        description: 'Publish immediately (skip staging)'
        required: false
        type: boolean
        default: false

env:
  VERCEL_URL: ${{ secrets.VERCEL_URL }}
  NEWSLETTER_CRON_SECRET: ${{ secrets.NEWSLETTER_CRON_SECRET }}

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    # Only run during NFL season (roughly Sept-Feb)
    # Can be adjusted or removed if you want year-round
    steps:
      - name: Determine if publish run
        id: check-publish
        run: |
          # Wednesday runs should publish
          DAY_OF_WEEK=$(date -u +%u)
          if [ "$DAY_OF_WEEK" = "3" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi
          # Manual trigger can override
          if [ "${{ github.event.inputs.publish }}" = "true" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Call Newsletter Cron API
        run: |
          PUBLISH="${{ steps.check-publish.outputs.publish }}"
          WEEK="${{ github.event.inputs.week }}"
          SEASON="${{ github.event.inputs.season }}"
          
          # Build JSON body
          BODY="{\"publish\": $PUBLISH"
          if [ -n "$WEEK" ]; then
            BODY="$BODY, \"week\": $WEEK"
          fi
          if [ -n "$SEASON" ]; then
            BODY="$BODY, \"season\": \"$SEASON\""
          fi
          BODY="$BODY}"
          
          echo "Calling newsletter cron with: $BODY"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $NEWSLETTER_CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$VERCEL_URL/api/newsletter/cron")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response ($HTTP_CODE):"
          echo "$BODY" | jq . || echo "$BODY"
          
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Newsletter cron failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Check Generation Status
        run: |
          WEEK="${{ github.event.inputs.week }}"
          SEASON="${{ github.event.inputs.season }}"
          
          QUERY=""
          if [ -n "$WEEK" ]; then
            QUERY="?week=$WEEK"
          fi
          if [ -n "$SEASON" ]; then
            if [ -n "$QUERY" ]; then
              QUERY="$QUERY&season=$SEASON"
            else
              QUERY="?season=$SEASON"
            fi
          fi
          
          curl -s "$VERCEL_URL/api/newsletter/cron$QUERY" | jq .
