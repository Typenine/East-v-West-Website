name: Stage validated trade and queue patch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Apply validated patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/13" --jq .body > /tmp/payload.txt
          awk '/^PATCH_B64_BEGIN$/{f=1;next}/^PATCH_B64_END$/{f=0}f' /tmp/payload.txt > /tmp/patch.gz.b64
          awk '/^FIX_B64_BEGIN$/{f=1;next}/^FIX_B64_END$/{f=0}f' /tmp/payload.txt > /tmp/fix.py.gz.b64
          base64 --decode /tmp/patch.gz.b64 | gzip --decompress > /tmp/tradeandqueue.patch
          base64 --decode /tmp/fix.py.gz.b64 | gzip --decompress > /tmp/correct_trade_patch.py
          git apply --check /tmp/tradeandqueue.patch
          git apply /tmp/tradeandqueue.patch
          python /tmp/correct_trade_patch.py

      - name: Stage non-workflow files
        run: |
          git restore .github/workflows/newsletter-scheduler.yml
          rm -rf src/app/api/internal/patch-bootstrap
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Stage validated trade and queue patch"
          git push --force origin HEAD:refs/heads/patch/trade-and-queue-staged
