name: Newsletter Update 5 Data Fix

on:
  push:
    branches:
      - newsletter-editor-update-5-20260720

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: newsletter-editor-update-5-20260720
      - name: Correct scoring history binding
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/newsletter/data-integration.ts')
          text = path.read_text()
          old = '    topScoringWeeks: allScoringWeeks.slice(0, 50),\n    h2hData,'
          new = '    allScoringWeeks,\n    h2hData,'
          if old not in text:
              raise SystemExit('Missing malformed Promise binding')
          text = text.replace(old, new, 1)
          old = '    h2h: h2hData,\n    topScoringWeeks,\n    weeklyHighLeaders:'
          new = '    h2h: h2hData,\n    topScoringWeeks: allScoringWeeks.slice(0, 50),\n    weeklyHighLeaders:'
          if old not in text:
              raise SystemExit('Missing comprehensive return binding')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/newsletter-update5-data-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/newsletter/data-integration.ts .github/workflows/newsletter-update5-data-fix.yml
          git commit -m "Newsletter System Update 5: fix scoring history binding"
          git push origin HEAD:newsletter-editor-update-5-20260720
