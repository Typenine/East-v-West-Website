name: Newsletter Scheduler

# Runs scripts/run-newsletter.mjs on a cadence. IMPORTANT: this only ever saves
# DRAFTS (status:'draft') and processes due editorial-calendar items into drafts.
# It NEVER autopublishes and NEVER posts to Discord — publishing is an explicit
# admin action (admin newsletter page / POST /api/newsletter/publish).
# (NEWSLETTER_STRICT_PUBLISH below is a quality gate on generation, not a publish switch.)

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Season number (e.g., 2025)"
        required: false
        type: string
      week:
        description: "Week number"
        required: false
        type: string
      episodeType:
        description: "Episode type (regular, pre_draft, post_draft, preseason)"
        required: false
        type: string
      force:
        description: "Bypass schedule gating"
        required: false
        type: boolean
      preview:
        description: "Preview mode (never persist)"
        required: false
        type: boolean
  schedule:
    # Hourly: drains the editorial-calendar queue. Each run processes any queued items
    # whose scheduled time has passed into DRAFTS, then early-exits when the legacy
    # schedule window doesn't apply. Cheap — a run with no due items does almost nothing.
    # (GitHub cron is not minute-precise; queued items fire within ~1h of their time.)
    - cron: '0 * * * *'
    # In-season retries: every 6 hours on Wednesday (UTC). Runner will gate by league timezone (ET) as needed
    - cron: '0 */6 * * 3'
    # Offseason checks (3x/week). Runner will no-op except on exact target days
    - cron: '0 12 * * 1,4,6'

concurrency:
  group: newsletter-scheduler
  cancel-in-progress: false

permissions:
  # The scheduled keepalive call re-enables this workflow via GitHub's API.
  contents: read
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      # Free-tier safety: slow + safe + fluid
      NEWSLETTER_MAX_CONCURRENCY: '1'
      NEWSLETTER_STRICT_PUBLISH: 'true'
      # Optional fallbacks for offseason targeting when Sleeper/consts are not accessible
      EVW_DRAFT_DATE_ISO: ${{ secrets.EVW_DRAFT_DATE_ISO }}
      EVW_SEASON_START_ISO: ${{ secrets.EVW_SEASON_START_ISO }}
      # Required secrets
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # LLM cascade keys — without these, episodes that lean on Claude (e.g. pre_draft
      # mock drafts) fall back, and with NEWSLETTER_STRICT_PUBLISH=true the run aborts
      # with no draft written. These must also exist as repo Actions secrets.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_20_API_KEY: ${{ secrets.GEMINI_20_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run newsletter generator
        run: >-
          npx tsx scripts/run-newsletter.mjs
          ${{ github.event.inputs.season && format('--season {0}', github.event.inputs.season) || '' }}
          ${{ github.event.inputs.week && format('--week {0}', github.event.inputs.week) || '' }}
          ${{ github.event.inputs.episodeType && format('--episodeType {0}', github.event.inputs.episodeType) || '' }}
          ${{ github.event.inputs.force == 'true' && '--force' || '' }}
          ${{ github.event.inputs.preview == 'true' && '--preview' || '' }}

      - name: Upload preview artifact
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.preview == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-preview-${{ github.run_id }}-s${{ github.event.inputs.season || 'auto' }}-w${{ github.event.inputs.week || 'auto' }}-e${{ github.event.inputs.episodeType || 'regular' }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 7

      # GitHub auto-disables cron schedules after 60 days without repo activity.
      # Re-enable this workflow through GitHub's own API without third-party actions.
      - name: Keep workflow schedule alive
        if: ${{ always() && github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --location --request PUT \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/newsletter-scheduler.yml/enable"
